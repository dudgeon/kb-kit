# pages.yml — build the KB data files and deploy the whole repo to GitHub Pages
# =============================================================================
#
# WHAT THIS IS
#   The only CI in kb-kit. On every push to main it:
#     1. checks out the repo,
#     2. runs scripts/build-index.mjs (regenerates assets/data/*.json from kb/),
#     3. uploads the ENTIRE repo root as the Pages artifact,
#     4. deploys it.
#
#   The whole repo is deployed on purpose: the site is not a static-site
#   generator. knowledge-base.html fetches raw kb/**/*.md and docs/*.md files
#   at runtime and renders them client-side, so those markdown files must be
#   part of the deployed artifact. Do not narrow the upload path to a dist/
#   folder — that would break every page view.
#
# FOR FORKS
#   Nothing to edit here. After forking, enable Pages once:
#     Settings → Pages → Build and deployment → Source: "GitHub Actions"
#   Then push (or run this workflow manually via the Actions tab) and your
#   site appears at https://<owner>.github.io/<repo>/.
#
# SAFE TO CUSTOMIZE
#   - Add a link-check or lint step between build and upload.
#   - Change the branch filter if your default branch isn't `main`.
#
# WILL BREAK THINGS
#   - Removing the build step (the site would serve a stale or missing index).
#   - Uploading anything other than the repo root (see above).
#   - Adding npm install steps: build-index.mjs is zero-dependency by design.

name: Build KB index and deploy to Pages

on:
  # Rebuild + redeploy whenever content or site code lands on main.
  push:
    branches: [main]
  # Manual trigger from the Actions tab — handy right after enabling Pages.
  workflow_dispatch:

# The minimum permissions GitHub Pages deployment requires. `contents: read`
# lets us check out; `pages: write` + `id-token: write` let the deploy step
# publish the artifact via OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# If several pushes land quickly, skip the stale in-flight deploys but never
# cancel one mid-publish (cancel-in-progress: false keeps deploys atomic).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Get the repo contents (kb/ markdown, site HTML/JS/CSS, this script).
      - name: Checkout
        uses: actions/checkout@v4

      # Node 20 ships on the runner image, but pin explicitly so the build is
      # reproducible. build-index.mjs needs Node >= 18 and nothing else — no
      # npm install, no lockfile.
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Regenerate assets/data/manifest.json and search-index.json from the
      # current contents of kb/ (and the indexed docs/). Prints a one-line
      # summary you can read in the workflow log.
      - name: Build manifest + search index
        run: node scripts/build-index.mjs

      # Configure the Pages environment (sets metadata the deploy step uses).
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # Package the repo root — including kb/**/*.md, docs/*.md, index.html,
      # knowledge-base.html, assets/** (with the JSON just built) — as the
      # artifact Pages will serve. `.git` and workflow internals are excluded
      # automatically by the action.
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    # Publish the artifact built above to the repo's Pages environment.
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
