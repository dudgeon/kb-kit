<!doctype html>
<!--
  knowledge-base.html — the ONE app shell for the whole knowledge base
  ====================================================================

  WHAT THIS IS
    The entire KB browsing experience is this single static file plus the
    ES modules in assets/js/. There are no per-page HTML files anywhere:
    the app reads the URL hash (#/page/kb/topics/x.md, #/type/note,
    #/search?q=okf) and renders the right view client-side, fetching raw
    markdown straight from the deployed repo. That is a hard invariant of
    this kit — see docs/site-guide.md before changing the architecture.

  HOW IT FITS
    - assets/data/manifest.json + search-index.json are generated by
      scripts/build-index.mjs (run by .github/workflows/pages.yml on push).
    - assets/js/app.js boots the app into the #app element below.
    - assets/css/site.css holds ALL styling; brand tokens live at its top.

  SAFE TO CUSTOMIZE
    - The header brand text / nav links below.
    - The <title> and meta description.
    - The noscript message copy.

  WILL BREAK THINGS
    - Moving this file out of the repo root (all fetches are relative:
      assets/…, kb/…, docs/…).
    - Removing the #app element, the build-stamp span, or the module
      script tag.
    - Adding external CDN scripts/styles: the site is deliberately
      self-contained and works under a strict Content-Security-Policy.
-->
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Knowledge base — kb-kit</title>
  <meta name="description" content="Browse and search this repository's knowledge base — rendered client-side from plain markdown.">
  <meta name="color-scheme" content="light dark">
  <link rel="stylesheet" href="assets/css/site.css">
  <!-- Favicon: inline SVG data URI so no extra file/request is needed. -->
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='0.9em' font-size='90'%3E%F0%9F%93%9A%3C/text%3E%3C/svg%3E">
</head>
<body>

  <!-- Site header: shared look with index.html (see .site-header in CSS). -->
  <header class="site-header">
    <div class="inner">
      <a class="brand" href="knowledge-base.html#/">📚 Knowledge base</a>
      <nav aria-label="Site">
        <a href="index.html">About the kit</a>
        <a href="knowledge-base.html#/page/kb/_index.md">Index</a>
        <a href="knowledge-base.html#/page/kb-card.md">kb-card</a>
      </nav>
    </div>
  </header>

  <!-- The app mounts everything into this element. Do not remove. -->
  <main id="app" class="kb-main" aria-live="polite">
    <p class="kb-loading">Loading the knowledge base…</p>
  </main>

  <!-- Graceful degradation: the browser app needs JS, but the knowledge
       itself never does — point no-JS visitors at the markdown on GitHub. -->
  <noscript>
    <div class="kb-main">
      <div class="notice">
        This browser app needs JavaScript, but the knowledge base itself is
        plain markdown — browse it directly in the <code>kb/</code> folder of
        the repository on GitHub, starting at <code>kb/_index.md</code>.
      </div>
    </div>
  </noscript>

  <footer class="site-footer">
    Rendered client-side from plain markdown ·
    <span id="build-stamp"></span> ·
    built with <a href="index.html">kb-kit</a>
  </footer>

  <!-- The entire app. ES modules: no bundler, no framework, no CDN. -->
  <script type="module" src="assets/js/app.js"></script>
</body>
</html>
